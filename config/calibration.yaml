# Sensor calibration for ECE445M Lab 7 robot.
# Edit values here to match real hardware behavior. No code changes or rebuilds
# needed — RobotEnv reloads this file on construction.
#
# One knob per physical quantity. If you find a discrepancy between sim and
# real robot, find the row here that best describes the mismatch.

ir:
  # Shared analog front-end (same GP2Y0A sensor on both sides).
  # Model:  v(d_cm) = curve_k / (d_cm + curve_c) + floor_v   (d >= peak_cm)
  #
  # Fit from the user's 2026-04-21 measurement (ADC averaged L/R, Vref=3.3,
  # 12-bit); 3-param curve_fit → max residual ≈ 0.09 V across the full range.
  curve_k: 10.7489
  curve_c: -2.7760
  floor_v: 0.7879

  # Non-monotonic regime boundary. Below this, voltage rises linearly from
  # peak_floor_v at contact up to the curve value at peak_cm.
  peak_cm: 4.0
  peak_floor_v: 0.4
  v_clamp: 3.1          # ADC rails at Vref

  # Reported-valid range. Outside this the reading is flagged invalid.
  # Firmware saturates at 305 mm (see IRDistance.c) → max_cm = 30.5.
  min_cm: 4.0
  max_cm: 30.5

  # Noise knobs. Applied before the firmware formula so noise is shaped the
  # same way a real sensor's is (ADC discretization comes after).
  voltage_noise_std: 0.02
  adc_noise_std: 0.0        # counts (Phase 2 will fit this from IR_Calib.xlsx)

  adc_max_count: 4095
  adc_vref: 3.3

  # Firmware per-side formula (see RTOS_Labs_common/IRDistance.c):
  #   d_mm = a / (adc + b) + c,  saturates at 305 mm when adc < adc_threshold.
  # Bootstrap values = current firmware constants; Phase 2 re-fits from
  # IR_Calib.xlsx and proposes an update if the new fit disagrees >5%.
  left:
    a: 137932
    b: -859
    c: 32
    adc_threshold: 1376
  right:
    a: 52850
    b: -1239
    c: 69
    adc_threshold: 1476
  sat_mm: 305.0

lidar:
  # Capped to 1 m (matches CAP_TFLUNA = 1000 mm). TF-Luna hardware spec is 8 m,
  # but the sim and model both treat 1 m as the reportable range for
  # wall-following — anything further is normalized to 1.0 and clipped.
  max_cm: 100.0
  # Measured: avg 163 mm, stdev 0.56 mm → 0.056 cm (SNR 291, 24.64 dB power).
  noise_std_cm: 0.056
  fov_rad: 0.0349       # ~2 deg (modeled as a single ray — FOV unused for now)
  rate_hz: 100.0

  # Post-raycast systematic-offset correction: reported = raw*scale + bias_cm.
  # Leave at defaults unless you measure a real offset against a known target.
  distance_scale: 1.0
  distance_bias_cm: 0.0

imu:
  # Firmware filter chain (see RTOS_SensorBoard/IMU.h):
  #   IMU_DLPF_CFG=0x03 → 44 Hz BW;  IMU_AVG_SAMPLES=4 → 4-sample block avg.
  dlpf_fc_hz: 44.0
  avg_samples: 4
  # Per-sample Gaussian noise (raw int16 LSB). Fit from the motors-on
  # stationary capture in Phase 2.
  gyro_noise_lsb: 0.0
  accel_noise_lsb: 0.0
  # Static bias, raw int16 LSB, (x, y, z). Sim emits bias-free signals;
  # calib/replay.py subtracts these from real logs before comparison. Phase 2
  # estimates these from the steady-state capture — flagged as coarse until
  # a motors-off flat capture is available.
  gyro_bias:  [0, 0, 0]
  accel_bias: [0, 0, 0]

# Sensor placements in body frame: +x forward, +y left, origin at chassis
# center. Chassis is 29.5 × 19.0 cm, so half-length 14.75 and half-width 9.5.
# All values measured from the physical robot.
#   Center lidar : 0 cm from front, centered (y = 0)             → x = +14.75
#   Left lidar   : 1 cm from front, 2 cm from left edge, +45°    → x = +13.75, y = +7.5
#   Right lidar  : 1 cm from front, 2 cm from right edge, -45°   → x = +13.75, y = -7.5
lidar_placements:
  - {id: tfluna_center, x: 14.75, y:  0.00, theta:  0.0000}
  - {id: tfluna_left,   x: 13.75, y:  7.50, theta:  0.7854}   #  +45 deg
  - {id: tfluna_right,  x: 13.75, y: -7.50, theta: -0.7854}   #  -45 deg

# IR mid-side, 11.8 cm from rear edge, 1 cm inset from the side edge,
# pointing straight outward.
#   x = -14.75 + 11.8 = -2.95
#   y = ±(9.5 - 1.0) = ±8.50
ir_placements:
  - {id: ir_left,  x: -2.95, y:  8.50, theta:  1.5708}        # +90 deg
  - {id: ir_right, x: -2.95, y: -8.50, theta: -1.5708}        # -90 deg
